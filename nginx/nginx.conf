events {
    worker_connections 1024;
}

http {
    # Log format that captures the full URI for auditability
    log_format proxy_log '$remote_addr [$time_local] "$request" '
                         '$status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log proxy_log;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 443 ssl;
        server_name nginx localhost;

        # ── TLS configuration ───────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Proxy to mitmproxy ──────────────────────────────────────────────
        location / {
            proxy_pass         http://mitmproxy:8080;

            # Rewrite Host to api.openai.com so mitmproxy (in reverse mode)
            # knows which upstream to forward the request to.
            proxy_set_header   Host              api.openai.com;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Preserve all original client headers (Authorization, Content-Type, …)
            proxy_pass_request_headers on;

            # Generous timeouts: Guardian inference on CPU can take 60–90 s
            proxy_connect_timeout 10s;
            proxy_send_timeout    180s;
            proxy_read_timeout    180s;

            # Disable response buffering so streamed replies work correctly
            proxy_buffering off;
        }
    }
}
