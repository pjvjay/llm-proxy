services:
  guardrails:
    build: ./guardrails
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"        # host-bound; for local eval only (safe to remove in prod)
    volumes:
      - ./models:/models:ro          # produced by guardrails/export_onnx.py
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if 'ok' in urllib.request.urlopen('http://localhost:8000/health').read().decode() else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [proxy-net]

  mitmproxy:
    build: ./mitmproxy
    env_file: .env
    depends_on:
      guardrails:
        condition: service_healthy
    networks: [proxy-net]

  nginx:
    build: ./nginx
    ports:
      - "8443:443"
    depends_on: [mitmproxy]
    volumes:
      - certs:/etc/nginx/certs
    networks: [proxy-net]

  client:
    build: ./client
    env_file: .env
    depends_on: [nginx]
    volumes:
      - certs:/certs:ro
    networks: [proxy-net]

networks:
  proxy-net:
    driver: bridge

volumes:
  certs:
